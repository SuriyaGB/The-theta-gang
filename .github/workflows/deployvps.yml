name: Deploy ThetaGang VPS

# Manual trigger from GitHub Actions UI
on:
  workflow_dispatch:

jobs:
  deploy:

    # GitHub-hosted Ubuntu runner
    runs-on: ubuntu-latest

    steps:

      # Connect to VPS server using SSH
      - name: Connect VPS and Update ThetaGang
        uses: appleboy/ssh-action@v1.0.3

        with:

          # VPS Public IP / Domain stored in GitHub Secrets
          host: ${{ secrets.HOST }}

          # VPS SSH Username
          username: root

          # SSH Private Key stored in GitHub Secrets
          key: ${{ secrets.SSH_KEY }}

          # Commands executed inside VPS server
          script: |

            echo "======================================="
            echo "Starting ThetaGang Deployment"
            echo "======================================="

            # Navigate to ThetaGang repository inside VPS
            cd /opt/hermes

            # Pull latest code changes from GitHub repository
            git pull origin main

            echo "======================================="
            echo "Updated Repository Files"
            echo "======================================="

            # List updated files for verification
            ls

            # Pull latest official ThetaGang Docker image
            docker pull brndnmtthws/thetagang:main

            # Remove stopped/exited Docker containers
            docker container prune -f

            # Remove dangling Docker images to free disk space safely
            docker image prune -f

            # Rebuild the local bot image with latest changes
            docker build -t thetagang-bot:local .
            echo "======================================="
            echo "Available Docker Images"
            echo "======================================="

            # Show available Docker images
            docker images

            echo "======================================="
            echo "Cron Scheduler Configuration"
            echo "======================================="

            # Show configured cron jobs
            crontab -l

            echo "======================================="
            echo "Current Docker Containers"
            echo "======================================="

            # Show running/exited containers
            docker ps -a

            echo "======================================="
            echo "ThetaGang Deployment Completed"
            echo "======================================="
