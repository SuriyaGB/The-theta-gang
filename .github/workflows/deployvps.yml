name: Deploy ThetaGang VPS

# Manual trigger from GitHub Actions UI
on:
  workflow_dispatch:

jobs:
  deploy:
    # GitHub-hosted Ubuntu runner
    runs-on: ubuntu-latest

    steps:
      # Connect to Hostinger VPS using SSH
      - name: Update ThetaGang Runtime
        uses: appleboy/ssh-action@v1.0.3

        with:
          # VPS Public IP / Domain
          host: ${{ secrets.HOST }}

          # VPS SSH Username
          username: root

          # SSH Private Key stored in GitHub Secrets
          key: ${{ secrets.SSH_KEY }}

          # Commands executed inside VPS
          script: |

            echo "======================================="
            echo "Starting ThetaGang VPS Update"
            echo "======================================="

            # Pull latest official ThetaGang image
            docker pull brndnmtthws/thetagang:main

            # Remove stopped/exited containers
            docker container prune -f

            # Remove unused Docker images
            docker image prune -af

            echo "======================================="
            echo "Docker Images"
            echo "======================================="
            docker images

            echo "======================================="
            echo "Current Containers"
            echo "======================================="
            docker ps -a

            echo "======================================="
            echo "Cron Scheduler"
            echo "======================================="
            crontab -l

            echo "======================================="
            echo "ThetaGang VPS Update Completed"
            echo "======================================="
